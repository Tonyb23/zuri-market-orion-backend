name: Build, Scan and Deploy to k3s on EC2

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/zuriapp-backend

jobs:

  # ─────────────────────────────────────────
  # JOB 1 — BUILD & SCAN IMAGE
  # Installs dependencies, runs tests, builds image,
  # scans locally, then pushes only if clean.
  # Image never reaches DockerHub unless it passes the Trivy scan.
  # ─────────────────────────────────────────
  build-and-scan:
    name: Build and Scan Docker Image
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test

    - name: Scan dependencies (npm audit)
      run: npm audit --audit-level=high

    - name: Log in to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker image
      run: |
        docker build \
          -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
        docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} \
          ${{ env.IMAGE_NAME }}:latest

    - name: Scan image with Trivy
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
        exit-code: 1
        severity: CRITICAL

    - name: Push Docker image to DockerHub
      if: success()  # Only push if the scan passes
      run: |
        docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
        docker push ${{ env.IMAGE_NAME }}:latest

  # ─────────────────────────────────────────
  # JOB 2 — DEPLOY to k3s on EC2
  # Only runs if build-and-scan passes.
  # Fetches secrets from AWS Secrets Manager,
  # syncs the Kubernetes Secret, applies the
  # manifests and waits for rollout to complete.
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to k3s on EC2
    runs-on: ubuntu-latest
    needs: build-and-scan

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
    
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3

    - name: Configure kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
        chmod 600 $HOME/.kube/config

    - name: Fetch secrets from AWS Secrets Manager and sync Kubernetes Secret
      run: |
        API_KEY=$(aws secretsmanager get-secret-value \
          --secret-id zurimarket/api-secret-key \
          --region us-east-1 \
          --query SecretString --output text | python3 -c "import sys,json; print(json.load(sys.stdin)['API_SECRET_KEY'])")

        STORE=$(aws secretsmanager get-secret-value \
          --secret-id zurimarket/store-name \
          --region us-east-1 \
          --query SecretString --output text | python3 -c "import sys,json; print(json.load(sys.stdin)['STORE_NAME'])")

        kubectl create secret generic zurimarket-secrets \
          --from-literal=API_SECRET_KEY=$API_KEY \
          --from-literal=STORE_NAME=$STORE \
          --dry-run=client -o yaml | kubectl apply -f -

    - name: Update image tag in deployment manifest 
      run: |
        sed -i "s|YOUR_DOCKERHUB_USERNAME/zuriapp-backend:latest|${{ env.IMAGE_NAME }}:${{ github.sha }}|g" k8s/deployment.yaml

    - name: Apply Kubernetes manifests
      run: |
        kubectl apply -f k8s/

    - name: Wait for rollout to complete
      run: |
        kubectl rollout status deployment/zurimarket-backend --timeout=120s

    - name: Show running pods
      run: |
        kubectl get pods -o wide
        kubectl get services -o wide