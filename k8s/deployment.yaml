apiVersion: apps/v1
kind: Deployment
metadata:
  name: zurimarket-backend
  labels:
    app: zurimarket-backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1 # at most 1 pod can be down during update 
      maxSurge: 1 # at most 1 extra pod can exist during update
  selector:
    matchLabels:
      app: zurimarket-backend
  template:
    metadata:
      labels:
        app: zurimarket-backend
    spec:
      containers:
      - name: zurimarket-backend
        image: tonyb23/zuriapp-backend:latest
        ports:
        - containerPort: 5000
        env:
        - name: API_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: zurimarket-secrets
              key: API_SECRET_KEY
        - name: STORE_NAME
          valueFrom:
            secretKeyRef:
              name: zurimarket-secrets
              key: STORE_NAME
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: zurimarket-backend-svc
spec:
  selector:
    app: zurimarket-backend
  ports:
  - port: 5000
    targetPort: 5000
  type: ClusterIP